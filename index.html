<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Cosmic Radio Graphies</title>

  <!-- Meta Tag SEO standard -->
  <meta name="description" content="Atlante interattivo dedicato alla transcodifica mediale delle onde radio catturate nello spazio profondo dalle sonde NASA (Voyager, Cassini, Juno).">
  <meta name="author" content="Diletta Grazioli">

  <!-- Meta Tag Open Graph (Social Preview richiesti dal prof) -->
  <meta property="og:title" content="Cosmic Radio Graphies">
  <meta property="og:description" content="Atlante interattivo dedicato alla transcodifica mediale delle onde radio catturate nello spazio profondo dalle sonde NASA (Voyager, Cassini, Juno).">
  <meta property="og:url" content="https://diletta23gra.github.io/cosmic-radio-graphies/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- LINK ASSOLUTO ALLA PREVIEW (Risolve il problema della condivisione social) -->

  <!-- Importazione Google Fonts per caricare Orbitron nativamente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Importazione delle librerie core di p5.js e p5.sound -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <!-- Stile CSS inline minimale per bloccare la pagina a tutto schermo ed eliminare le barre di scorrimento del browser -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
